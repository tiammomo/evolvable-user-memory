name: evolvable-user-memory

# Local-development credentials only. Do not reuse them outside this isolated
# Compose network. PostgreSQL is not published to the host.

x-database-url: &database-url postgresql://emf:emf-local-only@postgres:5432/evolvable_memory

x-projection-environment: &projection-environment
  EMF_PROJECTION_MODE: milvus
  EMF_PROJECTION_REQUIRED: ${EMF_PROJECTION_REQUIRED:-false}
  EMF_PROJECTION_NAME: ${EMF_PROJECTION_NAME:-milvus-memory-v1}
  EMF_PROJECTION_SEARCH_OVERSAMPLE: ${EMF_PROJECTION_SEARCH_OVERSAMPLE:-10}
  EMF_MILVUS_URI: http://milvus:19530
  EMF_MILVUS_TOKEN: ${EMF_MILVUS_TOKEN:-}
  EMF_MILVUS_COLLECTION: ${EMF_MILVUS_COLLECTION:-evolvable_memory_v1}
  EMF_MILVUS_CONSISTENCY_LEVEL: ${EMF_MILVUS_CONSISTENCY_LEVEL:-Bounded}
  EMF_MILVUS_TIMEOUT_SECONDS: ${EMF_MILVUS_TIMEOUT_SECONDS:-5.0}
  EMF_MILVUS_MIN_SIMILARITY: ${EMF_MILVUS_MIN_SIMILARITY:-0.15}
  EMF_EMBEDDING_PROVIDER: ${EMF_EMBEDDING_PROVIDER:-hash}
  EMF_EMBEDDING_MODEL: ${EMF_EMBEDDING_MODEL:-hash-blake2b-v1}
  EMF_EMBEDDING_DIMENSIONS: ${EMF_EMBEDDING_DIMENSIONS:-384}
  EMF_EMBEDDING_BASE_URL: ${EMF_EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
  EMF_EMBEDDING_API_KEY: ${EMF_EMBEDDING_API_KEY:-}
  EMF_EMBEDDING_TIMEOUT_SECONDS: ${EMF_EMBEDDING_TIMEOUT_SECONDS:-15.0}

x-app: &app
  build:
    context: .
  image: evolvable-user-memory:local
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=16m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin-local-only
    command: ["minio", "server", "/minio_data", "--console-address", ":9001"]
    volumes:
      - minio-data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.6.20
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin-local-only
      MQ_TYPE: woodpecker
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:19091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: evolvable_memory
      POSTGRES_USER: emf
      POSTGRES_PASSWORD: emf-local-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  migrate:
    <<: *app
    command: ["evolvable-memory-migrate"]
    environment:
      EMF_STORE: postgres
      EMF_DATABASE_URL: *database-url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    <<: *app
    environment:
      <<: *projection-environment
      EMF_ENVIRONMENT: development
      EMF_HOST: 0.0.0.0
      EMF_PORT: "38089"
      EMF_LOG_LEVEL: INFO
      EMF_AUTH_MODE: development
      EMF_FRONTEND_URL: ${EMF_FRONTEND_URL:-http://127.0.0.1:33009}
      EMF_PUBLIC_API_URL: ${EMF_PUBLIC_API_URL:-http://127.0.0.1:38089}
      EMF_CORS_ORIGINS: ${EMF_CORS_ORIGINS:-http://127.0.0.1:33009,http://localhost:33009}
      EMF_STORE: postgres
      EMF_DATABASE_URL: *database-url
      EMF_DATABASE_POOL_MIN_SIZE: "1"
      EMF_DATABASE_POOL_MAX_SIZE: "10"
      EMF_DATABASE_READINESS_TIMEOUT_SECONDS: ${EMF_DATABASE_READINESS_TIMEOUT_SECONDS:-1.0}
    ports:
      - "127.0.0.1:38089:38089"
    depends_on:
      migrate:
        condition: service_completed_successfully
      milvus:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:38089/readyz', timeout=2).read()
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  projector:
    <<: *app
    command: ["evolvable-memory-projector", "run"]
    environment:
      <<: *projection-environment
      EMF_ENVIRONMENT: development
      EMF_LOG_LEVEL: INFO
      EMF_STORE: postgres
      EMF_DATABASE_URL: *database-url
      EMF_DATABASE_POOL_MAX_SIZE: "4"
      EMF_DATABASE_READINESS_TIMEOUT_SECONDS: ${EMF_DATABASE_READINESS_TIMEOUT_SECONDS:-1.0}
      EMF_PROJECTION_WORKER_BATCH_SIZE: ${EMF_PROJECTION_WORKER_BATCH_SIZE:-64}
      EMF_PROJECTION_WORKER_LEASE_SECONDS: ${EMF_PROJECTION_WORKER_LEASE_SECONDS:-60.0}
      EMF_PROJECTION_WORKER_POLL_SECONDS: ${EMF_PROJECTION_WORKER_POLL_SECONDS:-1.0}
      EMF_PROJECTION_WORKER_RETRY_BASE_SECONDS: ${EMF_PROJECTION_WORKER_RETRY_BASE_SECONDS:-2.0}
      EMF_PROJECTION_WORKER_RETRY_MAX_SECONDS: ${EMF_PROJECTION_WORKER_RETRY_MAX_SECONDS:-300.0}
      EMF_PROJECTION_WORKER_MAX_ATTEMPTS: ${EMF_PROJECTION_WORKER_MAX_ATTEMPTS:-8}
    depends_on:
      migrate:
        condition: service_completed_successfully
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "evolvable-memory-projector", "check"]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    <<: *app
    command: ["evolvable-memory-frontend"]
    environment:
      EMF_FRONTEND_HOST: 0.0.0.0
      EMF_FRONTEND_PORT: "33009"
      EMF_PUBLIC_API_URL: ${EMF_PUBLIC_API_URL:-http://127.0.0.1:38089}
    ports:
      - "127.0.0.1:33009:33009"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:33009/', timeout=2).read()
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  postgres-data:
